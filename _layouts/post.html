---
layout: default
---

<article class="blog-post">
  <h1>{{ page.title }}</h1>
  <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">
    {{ page.date | date: "%d/%m/%Y" }} · 
    {% for category in page.categories %}
      <span style="display: inline-block; background: var(--bg-secondary); padding: 0.1rem 0.6rem; border-radius: 12px; font-size: 0.8rem; margin-right: 0.3rem; border: 1px solid var(--border-color);">{{ category }}</span>
    {% endfor %}
  </p>
  
  <div style="line-height: 1.8; color: var(--text-secondary);">
    {{ content }}
  </div>
  
  <p style="margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
    <a href="{{ '/md_pages/blog/' | relative_url }}" class="cta-link">← Volver al blog</a>
  </p>
</article>
