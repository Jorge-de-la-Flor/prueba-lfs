---
layout: default
---

<article class="blog-post">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <span class="post-date"><i class="far fa-calendar-alt"></i> {{ page.date | date: "%d/%m/%Y" }}</span>
    <span class="post-categories">
      {% for category in page.categories %}
        <span class="post-category">{{ category }}</span>
      {% endfor %}
    </span>
  </div>
  
  <div class="post-content">
    {{ content }}
  </div>
  
  <div class="post-footer">
    <a href="{{ '/md_pages/posts/' | relative_url }}#blog" class="cta-link">← Volver al blog</a>
  </div>
</article>
